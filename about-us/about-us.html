<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>من نحن | AOUN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        font-family: "Cairo", sans-serif;
        background: #f6f7fb;
        color: #193158;
      }

      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(760px, 100%);
        background: #fff;
        border: 1px solid #e5e8f0;
        border-radius: 24px;
        padding: 40px 28px;
        box-shadow: 0 12px 40px rgba(25, 49, 88, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 2.2rem;
      }

      p {
        margin: 0 0 24px;
        font-size: 1.05rem;
        line-height: 2;
        color: #4d5d7a;
      }

      a {
        display: inline-block;
        padding: 12px 22px;
        border-radius: 12px;
        background: #193158;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>من نحن</h1>
        <p>تحت الصيانة!</p>
        <a href="../index.html">العودة إلى الرئيسية</a>
      </div>
    </div>
  </body>
</html>
